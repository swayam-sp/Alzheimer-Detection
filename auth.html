<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - Clarity</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-poppins text-slate-800">

    <!-- 3D Transition Background -->
    <div class="page-transition-bg page-bg-auth">
        <div class="page-particles"></div>
    </div>

    <!-- 3D Animated Background with Particles -->
    <div class="min-h-screen flex items-center justify-center auth-bg p-4 relative overflow-hidden">
        <!-- 3D Floating Shapes -->
        <div class="floating-shapes">
            <div class="floating-shape"></div>
            <div class="floating-shape"></div>
            <div class="floating-shape"></div>
            <div class="floating-shape"></div>
            <div class="floating-shape"></div>
            <div class="floating-shape"></div>
        </div>

        <!-- 3D Particle System -->
        <div class="auth-particles">
            <div class="auth-particle" style="top: 20%; left: 10%; animation-delay: 0s;"></div>
            <div class="auth-particle" style="top: 60%; left: 80%; animation-delay: 2s;"></div>
            <div class="auth-particle" style="top: 40%; left: 60%; animation-delay: 4s;"></div>
            <div class="auth-particle" style="top: 80%; left: 20%; animation-delay: 6s;"></div>
            <div class="auth-particle" style="top: 30%; left: 90%; animation-delay: 8s;"></div>
            <div class="auth-particle" style="top: 70%; left: 40%; animation-delay: 10s;"></div>
            <div class="auth-particle" style="top: 10%; left: 70%; animation-delay: 12s;"></div>
            <div class="auth-particle" style="top: 50%; left: 30%; animation-delay: 14s;"></div>
            <div class="auth-particle" style="top: 90%; left: 50%; animation-delay: 16s;"></div>
            <div class="auth-particle" style="top: 25%; left: 85%; animation-delay: 18s;"></div>
        </div>

        <!-- Additional 3D Background Layers -->
        <div class="bg-layer-3d-1"></div>
        <div class="bg-layer-3d-2"></div>
        <div class="bg-layer-3d-3"></div>
        <div class="bg-layer-3d-4"></div>

        <div class="max-w-md w-full relative z-10">
            <!-- Logo with Animation -->
            <div class="text-center mb-8 auth-logo-enter">
                <a href="index.html" class="text-3xl font-bold text-white flex items-center justify-center gap-2 drop-shadow-lg">
                    <i data-lucide="brain-circuit" class="w-8 h-8"></i>
                    <span>Clarity</span>
                </a>
            </div>

            <!-- Main Card with Animation and Glow -->
            <div class="bg-white/85 backdrop-blur-3xl p-8 md:p-12 rounded-3xl auth-card-glow w-full auth-card-enter">
                <!-- Login Form -->
                <div id="login-form-container" class="form-container-enter">
                    <h2 class="text-2xl font-bold mb-2 text-slate-800">Welcome Back</h2>
                    <p class="text-slate-600 mb-8">Please enter your details to sign in.</p>
                    <form id="login-form" class="space-y-6">
                        <div>
                            <label for="login-username" class="block text-sm font-medium text-slate-700">Email</label>
                            <div class="mt-1 relative">
                                <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 auth-input-icon"></i>
                                <input id="login-username" name="username" type="email" required class="auth-input w-full pl-10 pr-3 py-3 rounded-lg">
                            </div>
                        </div>
                        <div>
                            <label for="login-password" class="block text-sm font-medium text-slate-700">Password</label>
                             <div class="mt-1 relative">
                                <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 auth-input-icon"></i>
                                <input id="login-password" name="password" type="password" required class="auth-input w-full pl-10 pr-3 py-3 rounded-lg">
                            </div>
                        </div>
                        <div id="login-error" class="text-red-500 text-sm message-enter hidden"></div>
                        <button type="submit" class="auth-btn w-full py-3 text-white font-semibold rounded-lg">
                            <span id="login-btn-text">Sign In</span>
                        </button>
                    </form>
                    <p class="text-center text-sm text-slate-600 mt-8">
                        Don't have an account?
                        <button id="show-register" class="auth-toggle-link font-semibold text-violet-600 ml-1">Sign up</button>
                    </p>
                </div>

                <!-- Register Form -->
                <div id="register-form-container" class="hidden">
                     <h2 class="text-2xl font-bold mb-2 text-slate-800">Create Account</h2>
                    <p class="text-slate-600 mb-8">Join Clarity to track your cognitive health.</p>
                    <form id="register-form" class="space-y-4">
                        <div>
                            <label for="register-username" class="block text-sm font-medium text-slate-700">Username</label>
                            <input id="register-username" name="username" type="text" required class="auth-input w-full mt-1 px-3 py-3 rounded-lg">
                        </div>
                        <div>
                            <label for="register-email" class="block text-sm font-medium text-slate-700">Email Address</label>
                            <input id="register-email" name="email" type="email" required class="auth-input w-full mt-1 px-3 py-3 rounded-lg">
                        </div>
                        <div>
                            <label for="register-password" class="block text-sm font-medium text-slate-700">Password</label>
                            <input id="register-password" name="password" type="password" required class="auth-input w-full mt-1 px-3 py-3 rounded-lg">
                        </div>
                        <div id="register-error" class="text-red-500 text-sm message-enter hidden"></div>
                         <button type="submit" class="auth-btn w-full py-3 text-white font-semibold rounded-lg !mt-8">
                            <span id="register-btn-text">Create Account</span>
                        </button>
                    </form>
                    <p class="text-center text-sm text-slate-600 mt-8">
                        Already have an account?
                        <button id="show-login" class="auth-toggle-link font-semibold text-violet-600 ml-1">Sign in</button>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Chatbot Widget -->
    <div id="chatbot-container"></div>

    <script>
        lucide.createIcons();
    </script>
    <script type="module" src="js/i18n.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
